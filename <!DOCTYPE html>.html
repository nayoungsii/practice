<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추첨기</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f7f7f7; }
    h1 { margin-bottom: 1rem; }
    .numbers { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .ball {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #222;
      background: #ffd700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    button { margin-right: 0.5rem; padding: 0.75rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>로또 번호 생성기</h1>
  <p>아래 버튼을 눌러 1~45 사이 번호 6개를 생성합니다.</p>
  <button id="generate">번호 생성</button>
  <button id="reset">초기화</button>
  <div class="numbers" id="result"></div>

  <script>
    const resultEl = document.getElementById('result');
    const generateBtn = document.getElementById('generate');
    const resetBtn = document.getElementById('reset');

    function pickLotto() {
      const nums = Array.from({ length: 45 }, (_, i) => i + 1);
      const picked = [];
      while (picked.length < 6) {
        const idx = Math.floor(Math.random() * nums.length);
        picked.push(nums.splice(idx, 1)[0]);
      }
      return picked.sort((a, b) => a - b);
    }

    function renderNumbers(numbers) {
      resultEl.innerHTML = '';
      numbers.forEach(n => {
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.textContent = n;
        resultEl.appendChild(ball);
      });
    }

    generateBtn.addEventListener('click', () => renderNumbers(pickLotto()));
    resetBtn.addEventListener('click', () => { resultEl.innerHTML = ''; });

    // 로드 시 한 번 생성
    renderNumbers(pickLotto());
  </script>
</body>
</html>
