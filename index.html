<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정유나가 바보인 이유</title>
    <style>
        :root {
            --bg-color: #fff0f5;
            --text-color: #4a4a4a;
            --container-bg: #ffffff;
            --accent-color: #ff69b4;
            --toggle-bg: #ffe4e1;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --container-bg: #2d2d2d;
            --accent-color: #ff85c0;
            --toggle-bg: #3d3d3d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--container-bg);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        .reason-list {
            text-align: left;
            display: inline-block;
        }

        .reason-item {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reason-item:nth-child(1) { animation-delay: 0.2s; }
        .reason-item:nth-child(2) { animation-delay: 0.5s; }
        .reason-item:nth-child(3) { animation-delay: 0.8s; }
        .reason-item:nth-child(4) { animation-delay: 1.1s; }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background-color: var(--toggle-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .emoji { font-size: 1.5rem; margin-right: 10px; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle">🌙 다크 모드</button>

    <div class="container">
        <h1>🔍 정유나가 바보인 이유</h1>
        <div class="reason-list">
            <div class="reason-item">
                <span class="emoji">🍦</span> 1. 아이스크림 먹으러 가자고 하면 자다가도 벌떡 일어남 (단순함)
            </div>
            <div class="reason-item">
                <span class="emoji">📱</span> 2. 휴대폰 손에 들고 "내 핸드폰 어디 갔지?" 하고 5분 동안 찾음
            </div>
            <div class="reason-item">
                <span class="emoji">🤡</span> 3. 안 웃긴 농담에도 혼자 빵 터져서 넘어감 (웃음 장벽 지하 100층)
            </div>
            <div class="reason-item">
                <span class="emoji">💖</span> 4. 사실은 너무 착해서 바보 소리 들을 정도로 다 퍼줌
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                html.removeAttribute('data-theme');
                themeToggle.innerHTML = '🌙 다크 모드';
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '☀️ 라이트 모드';
            }
        });
    </script>
</body>
</html>
